<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nb</title>
    <!-- Libraries are vendored locally (served from /static/vendor) so the viewer works offline -->
    <script src="/static/vendor/marked.min.js"></script>
    <script src="/static/vendor/highlight.min.js"></script>
    <script src="/static/vendor/highlight-python.min.js"></script>
    <script src="/static/vendor/highlight-sql.min.js"></script>
    <script src="/static/vendor/highlight-yaml.min.js"></script>
    <script src="/static/vendor/d3.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/github-dark.min.css">
    <link rel="stylesheet" href="/static/vendor/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/vendor/easymde.min.css">
    <script src="/static/vendor/easymde.min.js"></script>
    <style>/* STYLES_PLACEHOLDER */</style>
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="brand">nb</div>
            <input type="text" class="search-box" placeholder="Search notes..." id="searchInput">
            <div class="nav-section">
                <h3>Navigation</h3>
                <a class="nav-link" onclick="loadHome()">Home</a>
                <a class="nav-link" onclick="loadHistory()">History</a>
                <a class="nav-link" onclick="loadTodos()">Todos</a>
                <a class="nav-link" onclick="loadKanban()">Kanban</a>
                <a class="nav-link" onclick="loadGraph()">Graph</a>
            </div>
            <div class="nav-section nav-section-tree">
                <h3>
                    <span>Notebooks</span>
                    <span class="tree-refresh" onclick="loadTree()" title="Refresh tree">⟳</span>
                </h3>
                <div id="tree" class="tree"></div>
            </div>
        </nav>
        <div id="sidebar-resizer" class="resizer"></div>
        <main class="main">
            <div id="content"><p class="loading">Loading...</p></div>
        </main>
    </div>

    <script>/* SCRIPTS_PLACEHOLDER */</script>
</body>
</html>
